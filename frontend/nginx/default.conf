server {
  listen 80;
  server_name yeahmusic.tech www.yeahmusic.tech _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name yeahmusic.tech www.yeahmusic.tech _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  ssl_certificate /etc/letsencrypt/live/yeahmusic.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yeahmusic.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location /api/ {
    set $api_upstream api-gateway:4010;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    set $frontend_upstream frontend:5173;
    proxy_pass http://$frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
