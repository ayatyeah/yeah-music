services:
  frontend:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:5173"

  frontend-nginx:
    restart: unless-stopped
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/nginx/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend

  api-gateway:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/api-gateway:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      - PORT=4010
      - AUTH_URL=http://auth-service:4001
      - MUSIC_URL=http://music-service:4002
      - UPLOAD_URL=http://upload-service:4004
      - ANALYTICS_URL=http://analytics-service:4005
      - NOTIFY_URL=http://notification-service:4006
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-dev-secret-change-me}
    ports:
      - "127.0.0.1:4010:4010"
    depends_on:
      - auth-service
      - music-service
      - playlist-service
      - upload-service
      - analytics-service
      - notification-service

  auth-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/auth-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      - PORT=4001
      - AUTH_DATABASE_URL=postgres://auth:authpass@auth-db:5432/auth
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-dev-secret-change-me}
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      - auth-db

  auth-db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=auth
      - POSTGRES_USER=auth
      - POSTGRES_PASSWORD=authpass
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  music-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/music-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: music-service/Dockerfile
    environment:
      - PORT=4002
      - MUSIC_DATABASE_URL=postgres://music:musicpass@music-db:5432/music
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      - music-db

  playlist-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/playlist-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: playlist-service/Dockerfile
    environment:
      - PORT=4003
    ports:
      - "127.0.0.1:4003:4003"

  upload-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/upload-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: upload-service/Dockerfile
    environment:
      - PORT=4004
    ports:
      - "127.0.0.1:4004:4004"

  analytics-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/analytics-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: analytics-service/Dockerfile
    environment:
      - PORT=4005
    ports:
      - "127.0.0.1:4005:4005"

  notification-service:
    restart: unless-stopped
    image: ghcr.io/${GHCR_OWNER:-ayatyeah}/notification-service:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      - PORT=4006
    ports:
      - "127.0.0.1:4006:4006"

  music-db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=music
      - POSTGRES_USER=music
      - POSTGRES_PASSWORD=musicpass
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - music-db-data:/var/lib/postgresql/data

  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts/rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "127.0.0.1:9091:9090"
    depends_on:
      - api-gateway

  alertmanager:
    restart: unless-stopped
    image: prom/alertmanager:v0.28.0
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "127.0.0.1:9093:9093"

  grafana:
    restart: unless-stopped
    image: grafana/grafana:11.5.0
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  auth-db-data:
  music-db-data:
