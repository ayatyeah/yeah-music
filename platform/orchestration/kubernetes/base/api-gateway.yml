apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: yeahmusic
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: yeahmusic/api-gateway:latest
          ports:
            - containerPort: 4010
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "4010"
            - name: AUTH_URL
              value: "http://auth-service:4001"
            - name: MUSIC_URL
              value: "http://music-service:4002"
            - name: PLAYLIST_URL
              value: "http://playlist-service:4003"
            - name: UPLOAD_URL
              value: "http://upload-service:4004"
            - name: ANALYTICS_URL
              value: "http://analytics-service:4005"
            - name: NOTIFY_URL
              value: "http://notification-service:4006"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4010
            initialDelaySeconds: 3
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /readyz
              port: 4010
            failureThreshold: 30
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4010
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: yeahmusic
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 4010
      targetPort: 4010
  type: ClusterIP

