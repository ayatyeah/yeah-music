apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: yeahmusic
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: yeahmusic/auth-service:latest
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: AUTH_DATABASE_URL
              value: "postgres://auth:authpass@auth-db:5432/auth"
            - name: AUTH_JWT_SECRET
              value: "dev-secret-change-me"
          readinessProbe:
            httpGet: { path: /readyz, port: 4001 }
            initialDelaySeconds: 3
            periodSeconds: 5
          startupProbe:
            httpGet: { path: /readyz, port: 4001 }
            failureThreshold: 30
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 4001 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: yeahmusic
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 4001
      targetPort: 4001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-service
  namespace: yeahmusic
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: music-service
  template:
    metadata:
      labels:
        app: music-service
    spec:
      containers:
        - name: music-service
          image: yeahmusic/music-service:latest
          ports:
            - containerPort: 4002
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          env:
            - name: PORT
              value: "4002"
            - name: MUSIC_DATABASE_URL
              value: "postgres://music:musicpass@music-db:5432/music"
          readinessProbe:
            httpGet: { path: /readyz, port: 4002 }
            initialDelaySeconds: 3
            periodSeconds: 5
          startupProbe:
            httpGet: { path: /readyz, port: 4002 }
            failureThreshold: 30
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 4002 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: music-service
  namespace: yeahmusic
spec:
  selector:
    app: music-service
  ports:
    - name: http
      port: 4002
      targetPort: 4002
---
