apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: yeahmusic
spec:
  replicas: 2
  revisionHistoryLimit: 5
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ayatyeah/frontend:latest
          ports:
            - containerPort: 5173
          readinessProbe:
            httpGet: { path: /, port: 5173 }
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet: { path: /, port: 5173 }
            failureThreshold: 30
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /, port: 5173 }
            initialDelaySeconds: 10
            periodSeconds: 10
