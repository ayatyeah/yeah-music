groups:
  - name: yeahmusic-sre
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "Service is down"
          description: "Target {{ $labels.instance }} (job={{ $labels.job }}) has been down for >15s."

      - alert: High5xxRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[1m])) by (service)
            /
          clamp_min(sum(rate(http_requests_total[1m])) by (service), 1)
          > 0.05
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate"
          description: "Service {{ $labels.service }} has >5% 5xx over 1m."

      - alert: SimulatedIncidentActive
        expr: max(service_degraded) by (service) == 1
        for: 10s
        labels:
          severity: info
        annotations:
          summary: "Simulated incident active"
          description: "Service {{ $labels.service }} is intentionally degraded (demo incident mode)."

