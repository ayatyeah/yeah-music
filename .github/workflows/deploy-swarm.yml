name: Deploy to Docker Swarm

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-swarm:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-swarm-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy compose and deploy
        run: |
          set -euo pipefail
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }}:/tmp/docker-compose.yml
          ssh -o StrictHostKeyChecking=no ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }} '
            set -euo pipefail
            docker stack deploy -c /tmp/docker-compose.yml app

            failed=0
            for svc in $(docker stack services app --format "{{.Name}}"); do
              replicas=$(docker service ls --filter name="$svc" --format "{{.Replicas}}" | head -n 1)
              running=$(echo "$replicas" | cut -d/ -f1)
              desired=$(echo "$replicas" | cut -d/ -f2)
              if [ "$running" != "$desired" ]; then
                echo "Service $svc is unhealthy: $replicas"
                failed=1
              fi
            done

            if [ "$failed" -ne 0 ]; then
              echo "Swarm health-check failed. Rolling back updated services."
              for svc in $(docker stack services app --format "{{.Name}}"); do
                docker service update --rollback "$svc" || true
              done
              exit 1
            fi
          '
