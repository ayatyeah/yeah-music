name: Deploy to Docker Swarm

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-swarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy compose and deploy
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }}:/tmp/docker-compose.yml
          ssh -o StrictHostKeyChecking=no ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }} "docker stack deploy -c /tmp/docker-compose.yml app || true"
