name: Deploy to Docker Swarm

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-swarm:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-swarm-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Swarm
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          scp -o StrictHostKeyChecking=no docker-compose.yml \
            ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }}:~/yeah-music/docker-compose.yml

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }} \
            "cd ~/yeah-music && \
             docker stack deploy -c docker-compose.yml app --with-registry-auth"

      - name: Health check
        run: |
          sleep 15
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SWARM_USER }}@${{ secrets.SWARM_HOST }} '
            failed=0
            for svc in $(docker stack services app --format "{{.Name}}"); do
              replicas=$(docker service ls --filter name="$svc" --format "{{.Replicas}}" | head -n 1)
              running=$(echo "$replicas" | cut -d/ -f1)
              desired=$(echo "$replicas" | cut -d/ -f2)
              if [ "$running" != "$desired" ]; then
                echo "UNHEALTHY: $svc ($replicas)"
                failed=1
              else
                echo "OK: $svc ($replicas)"
              fi
            done
            exit $failed
          '