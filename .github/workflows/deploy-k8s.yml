name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Build and Push Images"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-k8s-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > kubeconfig
          mkdir -p $HOME/.kube
          mv kubeconfig $HOME/.kube/config

      - name: Update deployment images and verify rollout
        env:
          KUBECONFIG: $HOME/.kube/config
        run: |
          set -euo pipefail
          NAMESPACE=yeahmusic

          DEPLOYMENTS=(
            "api-gateway:api-gateway"
            "auth-service:auth-service"
            "music-service:music-service"
            "notification-service:notification-service"
            "playlist-service:playlist-service"
            "upload-service:upload-service"
            "frontend:frontend"
          )

          updated=()
          for entry in "${DEPLOYMENTS[@]}"; do
            dep="${entry%%:*}"
            container="${entry##*:}"

            if kubectl get deployment "$dep" -n "$NAMESPACE" >/dev/null 2>&1; then
              image="ghcr.io/${{ github.repository_owner }}/$container:${{ github.sha }}"
              kubectl set image deployment/"$dep" "$container"="$image" -n "$NAMESPACE"
              updated+=("$dep")
            fi
          done

          if [ "${#updated[@]}" -eq 0 ]; then
            echo "No matching deployments found in namespace $NAMESPACE"
            exit 1
          fi

          for dep in "${updated[@]}"; do
            if ! kubectl rollout status deployment/"$dep" -n "$NAMESPACE" --timeout=180s; then
              echo "Rollout failed for $dep, rolling back"
              kubectl rollout undo deployment/"$dep" -n "$NAMESPACE"
              kubectl rollout status deployment/"$dep" -n "$NAMESPACE" --timeout=180s || true
              exit 1
            fi
          done
