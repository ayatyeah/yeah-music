name: Deploy to Kubernetes

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-k8s-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBE_CONFIG_DATA }}" ]; then
            echo "ERROR: KUBE_CONFIG_DATA secret is empty. Add the base64 kubeconfig into repository secrets: Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Decoding kubeconfig..."
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > kubeconfig || true
          if [ ! -s kubeconfig ]; then
            echo "ERROR: decoded kubeconfig is empty or invalid. Check the secret value."
            ls -l kubeconfig || true
            echo "--- begin kubeconfig (first 200 chars) ---"
            head -c 200 kubeconfig || true
            echo "--- end kubeconfig ---"
            exit 1
          fi
          mkdir -p $HOME/.kube
          mv kubeconfig $HOME/.kube/config
          echo "kubeconfig written to $HOME/.kube/config"
          echo "Namespaces available:" 
          kubectl --kubeconfig=$HOME/.kube/config get ns || true

      - name: Update deployment images and verify rollout
        env:
          KUBECONFIG: $HOME/.kube/config
        run: |
          set -euo pipefail
          NAMESPACE=yeahmusic
          IMAGE_TAG="${{ github.sha }}"

          DEPLOYMENTS=(
            "api-gateway:api-gateway"
            "auth-service:auth-service"
            "music-service:music-service"
            "notification-service:notification-service"
            "playlist-service:playlist-service"
            "upload-service:upload-service"
            "frontend:frontend"
          )

          updated=()
          echo "Listing deployments in namespace $NAMESPACE before updates:"
          kubectl get deploy -n "$NAMESPACE" --no-headers || true
          count=$(kubectl get deploy -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l || true)
          echo "Found deployments in $NAMESPACE: ${count}"

          for entry in "${DEPLOYMENTS[@]}"; do
            dep="${entry%%:*}"
            container="${entry##*:}"

            if kubectl get deployment "$dep" -n "$NAMESPACE" >/dev/null 2>&1; then
              image="ghcr.io/${{ github.repository_owner }}/$container:${IMAGE_TAG}"
              kubectl set image deployment/"$dep" "$container"="$image" -n "$NAMESPACE"
              updated+=("$dep")
            fi
          done

          if [ "${#updated[@]}" -eq 0 ]; then
            echo "ERROR: No matching deployments found in namespace $NAMESPACE"
            echo "Check that the namespace exists and deployments are applied."
            kubectl get deploy -n "$NAMESPACE" || true
            exit 1
          fi

          for dep in "${updated[@]}"; do
            if ! kubectl rollout status deployment/"$dep" -n "$NAMESPACE" --timeout=180s; then
              echo "Rollout failed for $dep, rolling back"
              kubectl rollout undo deployment/"$dep" -n "$NAMESPACE"
              kubectl rollout status deployment/"$dep" -n "$NAMESPACE" --timeout=180s || true
              exit 1
            fi
          done
