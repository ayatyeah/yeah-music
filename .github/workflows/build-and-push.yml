name: Build and Push Images

on:
  push:
    branches: [ master, main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - name: api-gateway
            context: ./backend
            dockerfile: backend/api-gateway/Dockerfile
          - name: auth-service
            context: ./backend
            dockerfile: backend/auth-service/Dockerfile
          - name: analytics-service
            context: ./backend
            dockerfile: backend/analytics-service/Dockerfile
          - name: music-service
            context: ./backend
            dockerfile: backend/music-service/Dockerfile
          - name: notification-service
            context: ./backend
            dockerfile: backend/notification-service/Dockerfile
          - name: playlist-service
            context: ./backend
            dockerfile: backend/playlist-service/Dockerfile
          - name: upload-service
            context: ./backend
            dockerfile: backend/upload-service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.sha }}
