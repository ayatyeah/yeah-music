name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and Test per-service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: frontend
          - name: api-gateway
            path: backend/api-gateway
          - name: auth-service
            path: backend/auth-service
          - name: analytics-service
            path: backend/analytics-service
          - name: music-service
            path: backend/music-service
          - name: notification-service
            path: backend/notification-service
          - name: playlist-service
            path: backend/playlist-service
          - name: upload-service
            path: backend/upload-service

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
          else
            echo "no package.json"
          fi

      - name: Run tests (if available)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " test"; then npm test; else echo "no test script"; fi
          fi

