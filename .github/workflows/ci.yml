name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and Test per-service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            path: frontend
          - name: api-gateway
            path: backend/api-gateway
          - name: auth-service
            path: backend/auth-service
          - name: analytics-service
            path: backend/analytics-service
          - name: music-service
            path: backend/music-service
          - name: notification-service
            path: backend/notification-service
          - name: playlist-service
            path: backend/playlist-service
          - name: upload-service
            path: backend/upload-service

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi

      - name: Run tests (if available)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f package.json ]; then
            if npm run | grep -q " test"; then npm test; else echo "no test script"; fi
          fi
name: CI
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (workspaces)
        run: npm ci
        working-directory: backend
      - name: Test
        run: npm test
        working-directory: backend

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images (no push)
        uses: docker/bake-action@v6
        with:
          files: |
            ./cicd/github-actions/docker-bake.hcl
          push: false
